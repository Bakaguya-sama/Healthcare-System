name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Type check (tất cả packages)
  # ─────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Run lint (Turbo)
      #   run: pnpm lint

      - name: Run type check (Turbo)
        run: pnpm check-types

  # ─────────────────────────────────────────────
  # Job 2: Build tất cả apps
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps (Turbo)
        run: pnpm build
        env:
          # Biến môi trường giả để build thành công (không cần MongoDB thực)
          MONGODB_URI: mongodb://localhost:27017/healthcare_test
          JWT_SECRET: ci_secret_key_for_build_only
          GEMINI_API_KEY: placeholder

      - name: Upload build artifacts (api)
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 1

      - name: Upload build artifacts (client)
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: apps/client/dist
          retention-days: 1

      - name: Upload build artifacts (admin)
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: apps/admin/dist
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 3: Unit test (NestJS API)
  # ─────────────────────────────────────────────
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: apps/api
        run: pnpm test --passWithNoTests
        env:
          JWT_SECRET: ci_secret_key_for_tests_only
          MONGODB_URI: mongodb://localhost:27017/healthcare_test
          GEMINI_API_KEY: placeholder

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage
          retention-days: 7
